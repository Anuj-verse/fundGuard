services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5.18-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/fraud123456
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - /home/anuj-gope/fundguard/files2_neo4j_data/_data:/data

  edge-service:
    build: 
      context: ./edge-service
    ports:
      - "8001:8000"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - kafka
      - redis

  graph-service:
    build: 
      context: ./graph-service
    ports:
      - "8002:8000"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - NEO4J_URI=bolt://neo4j:7687
      - KAFKA_TOPIC=transactions-live
    depends_on:
      - kafka
      - neo4j

  risk-engine:
    build:
      context: ./risk-engine
    ports:
      - "8004:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKERS=kafka:29092
      - DATABASE_URL=postgresql://postgres:frauddefend@postgres:5432/fundguard
    depends_on:
      - redis
      - kafka
      - postgres

  llm-service:
    build: 
      context: ./llm-service
    ports:
      - "8003:8000"

  dashboard-api:
    build:
      context: ./dashboard-api
    ports:
      - "8005:8005"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - LLM_SERVICE_URL=http://llm-service:8000
      - DATABASE_URL=postgresql+asyncpg://postgres:frauddefend@postgres:5432/fundguard
    depends_on:
      - kafka
      - llm-service
      - postgres

  dashboard:
    build: 
      context: ./dashboard
    ports:
      - "3000:80"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=frauddefend
      - POSTGRES_DB=fundguard
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

